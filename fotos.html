<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Our Space: El Álbum Infinito</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="script.js">
    </script>
    <style>
        .glass-panel {
            background: rgba(19, 20, 18, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 205, 204, 0.15);
            box-shadow: inset 1px 1px 0px rgba(255, 255, 255, 0.05), 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) {
            .gallery-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
            .gallery-item:nth-child(6n+1) { grid-column: span 2; grid-row: span 2; }
        }
        .gallery-item { position: relative; overflow: hidden; border-radius: 0.75rem; border: 1px solid rgba(255, 205, 204, 0.12); aspect-ratio: 1 / 1; cursor: zoom-in; background: #1f201e; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease, filter 0.6s ease; filter: saturate(0.9) brightness(0.92); }
        .gallery-item:hover img { transform: scale(1.08); filter: saturate(1.05) brightness(1); }
        .gallery-item::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(19,20,18,0.55) 0%, transparent 45%); pointer-events: none; }
        
        .gallery-item .zoom-icon { position: absolute; bottom: 10px; right: 10px; width: 28px; height: 28px; border-radius: 9999px; background: rgba(19,20,18,0.55); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; opacity: 0; transform: translateY(4px); transition: opacity 0.3s ease, transform 0.3s ease; z-index: 2; }
        .gallery-item:hover .zoom-icon { opacity: 1; transform: translateY(0); }
        .gallery-item .zoom-icon .material-symbols-outlined { font-size: 16px; color: #ffcdcc; }
        
        .scroll-reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1), transform 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
        .scroll-reveal.revealed { opacity: 1; transform: translateY(0); }
        .scroll-reveal-scale { opacity: 0; transform: scale(0.85); transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        .scroll-reveal-scale.revealed { opacity: 1; transform: scale(1); }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden antialiased pt-20">
    <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile md:px-margin-desktop h-20 mx-auto bg-background/80 backdrop-blur-xl border-b border-primary/20 shadow-sm shadow-primary/10 transition-all duration-300 ease-out">
        <div class="font-headline-md text-headline-md text-tertiary drop-shadow-[0_0_8px_rgba(254,214,0,0.5)]">I & A</div>
        <nav class="hidden md:flex gap-gutter items-center font-label-sm text-label-sm">
            <a class="text-on-surface-variant hover:text-primary transition-colors hover:bg-white/5 px-3 py-2 rounded-lg uppercase tracking-widest" href="index.html">Our Space</a>
            <a class="text-on-surface-variant hover:text-primary transition-colors hover:bg-white/5 px-3 py-2 rounded-lg uppercase tracking-widest" href="meses.html">Monthly Messages</a>
            <a class="text-primary border-b-2 border-primary pb-1 uppercase tracking-widest" href="fotos.html">Galería</a>
            <a class="text-on-surface-variant hover:text-primary transition-colors hover:bg-white/5 px-3 py-2 rounded-lg uppercase tracking-widest" href="constelacion.html">Constelación</a>
            <a class="text-on-surface-variant hover:text-primary transition-colors hover:bg-white/5 px-3 py-2 rounded-lg uppercase tracking-widest" href="carta.html">Carta</a>
        </nav>
    </header>

    <main class="flex-grow">
        <section class="py-stack-lg px-margin-mobile md:px-margin-desktop relative bg-background" id="galeria">
            <div class="max-w-container-max mx-auto flex flex-col items-center gap-stack-md">
                <h2 class="font-headline-md text-headline-md text-primary text-center scroll-reveal">Nuestra Galería</h2>
                <p class="font-body-md text-body-md text-on-surface-variant text-center max-w-2xl scroll-reveal" style="transition-delay: 0.1s;"></p>
                <div class="gallery-grid w-full mt-8" id="gallery-grid"></div>
            </div>
        </section>
    </main>

    <footer
        class="w-full py-stack-lg px-margin-desktop flex flex-col items-center gap-base bg-background border-t border-primary/10">
        <div class="font-headline-sm text-headline-sm text-primary mb-4">I & A</div>
        <p class="font-body-md text-body-md text-tertiary text-center max-w-md">Hecho con amor • El Álbum Infinito</p>
    </footer>

    <!-- Lightbox (Visor de fotos gigantes) -->
    <div class="fixed inset-0 z-[110] flex items-center justify-center p-margin-mobile opacity-0 pointer-events-none transition-opacity duration-300" id="lightbox">
        <div class="absolute inset-0 bg-background/90 backdrop-blur-md" onclick="closeLightbox()"></div>
        <button id="lightbox-close" onclick="closeLightbox()" class="absolute top-6 right-6 z-10 text-on-surface-variant hover:text-primary transition-all p-2 rounded-full glass-panel">
            <span class="material-symbols-outlined">close</span>
        </button>
        <button onclick="changeLightbox(-1)" class="absolute left-4 md:left-8 z-10 text-on-surface-variant hover:text-primary transition-all p-2 rounded-full glass-panel">
            <span class="material-symbols-outlined">chevron_left</span>
        </button>
        <button onclick="changeLightbox(1)" class="absolute right-4 md:right-8 z-10 text-on-surface-variant hover:text-primary transition-all p-2 rounded-full glass-panel">
            <span class="material-symbols-outlined">chevron_right</span>
        </button>
        <div class="relative z-[5] max-w-4xl w-full flex flex-col items-center gap-4">
            <img id="lightbox-img" src="" alt="" class="max-h-[75vh] w-auto max-w-full rounded-xl border border-primary/20 shadow-[0_20px_60px_rgba(0,0,0,0.5)]" />
            <p id="lightbox-caption" class="font-body-md text-body-md text-on-surface-variant text-center max-w-lg"></p>
            <p id="lightbox-counter" class="font-label-sm text-label-sm text-tertiary tracking-widest uppercase"></p>
        </div>
    </div>

    <script>
        /* =========================================================
           GALERÍA DE FOTOS (Cambia las rutas aquí)
           ========================================================= */
        const galleryImages = [
            { src: "img/1.jpg", caption: "" },
            { src: "img/2.jpg", caption: "" },
            { src: "img/3.jpg", caption: "" },
            { src: "img/4.jpg", caption: "" },
            { src: "img/5.jpg", caption: "" },
            { src: "img/6.jpg", caption: "" },
            { src: "img/7.jpg", caption: "" },
            { src: "img/8.jpg", caption: "" },
            { src: "img/9.jpg", caption: "" },

            { src: "img/11.jpg", caption: "" },
            { src: "img/12.jpg", caption: "" },
            { src: "img/13.jpg", caption: "" },

            { src: "img/19.jpg", caption: "" },
            { src: "img/20.jpg", caption: "" },
            { src: "img/21.jpg", caption: "" },
            { src: "img/22.jpg", caption: "" },
            { src: "img/23.jpg", caption: "" },
            { src: "img/24.jpg", caption: "" },
            { src: "img/25.jpg", caption: "" },
            { src: "img/26.jpg", caption: "" },
            { src: "img/27.jpg", caption: "" },
            { src: "img/28.jpg", caption: "" },
            { src: "img/29.jpg", caption: "" },
            { src: "img/30.jpg", caption: "" },
            { src: "img/31.jpg", caption: "" },
            { src: "img/32.jpg", caption: "" },
            { src: "img/33.jpg", caption: "" },
            { src: "img/34.jpg", caption: "" },
            { src: "img/35.jpg", caption: "" },
            { src: "img/36.jpg", caption: "" },
            { src: "img/37.jpg", caption: "" },
            { src: "img/38.jpg", caption: "" },
            { src: "img/39.jpg", caption: "" },
            { src: "img/40.jpg", caption: "" },
            { src: "img/41.jpg", caption: "" },
            { src: "img/42.jpg", caption: "" },
            { src: "img/43.jpg", caption: "" },
            { src: "img/44.jpg", caption: "" },
            { src: "img/45.jpg", caption: "" },
            { src: "img/46.jpg", caption: "" },
            { src: "img/47.jpg", caption: "" },
            { src: "img/48.jpg", caption: "" },
      
        ];

        const galleryGrid = document.getElementById("gallery-grid");

        function renderGallery() {
            if (!galleryGrid) return;
            galleryGrid.innerHTML = galleryImages.map((photo, index) => {
                const delay = (index % 4) * 0.12;
                return `
                <div class="gallery-item scroll-reveal-scale" style="transition-delay: ${delay}s;" onclick="openLightbox(${index})">
                    <img src="${photo.src}" alt="${photo.caption || 'Foto'}" loading="lazy" />
                    <div class="zoom-icon">
                        <span class="material-symbols-outlined">zoom_in</span>
                    </div>
                </div>
                `;
            }).join("");
        }

        // ---------- Lightbox Funciones ----------
        let currentLightboxIndex = 0;
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");
        const lightboxCaption = document.getElementById("lightbox-caption");
        const lightboxCounter = document.getElementById("lightbox-counter");

        function openLightbox(index) {
            currentLightboxIndex = index;
            updateLightbox();
            lightbox.classList.remove("opacity-0", "pointer-events-none");
        }

        function closeLightbox() { 
            lightbox.classList.add("opacity-0", "pointer-events-none"); 
        }

        function changeLightbox(direction) {
            currentLightboxIndex = (currentLightboxIndex + direction + galleryImages.length) % galleryImages.length;
            updateLightbox();
        }

        function updateLightbox() {
            const photo = galleryImages[currentLightboxIndex];
            if (photo) {
                lightboxImg.src = photo.src;
                lightboxImg.alt = photo.caption || "Foto";
                lightboxCaption.textContent = photo.caption || "";
                lightboxCounter.textContent = `${currentLightboxIndex + 1} / ${galleryImages.length}`;
            }
        }

        // Navegación por teclado
        document.addEventListener("keydown", (e) => {
            if (lightbox.classList.contains("pointer-events-none")) return;
            if (e.key === "Escape") closeLightbox();
            if (e.key === "ArrowLeft") changeLightbox(-1);
            if (e.key === "ArrowRight") changeLightbox(1);
        });

        // ---------- Inicializar Scroll Reveal ----------
        function initScrollReveal() {
            const revealEls = document.querySelectorAll(".scroll-reveal, .scroll-reveal-scale");
            if (!revealEls.length) return;
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add("revealed");
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1, rootMargin: "0px 0px -40px 0px" });
            
            revealEls.forEach((el) => observer.observe(el));
        }

        // Arrancar la página
        document.addEventListener("DOMContentLoaded", () => {
            renderGallery();
            initScrollReveal();
        });
    </script>
</body>
</html>
